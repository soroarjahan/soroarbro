<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <h1>User Profile</h1>
            
            <div class="profile-image-container">
                <div class="profile-image-wrapper">
                    <img id="profileImage" src="" alt="Profile Picture" class="profile-image">
                    <div class="image-placeholder" id="imagePlaceholder">
                        <span class="placeholder-icon">👤</span>
                        <span class="placeholder-text">Upload Photo</span>
                    </div>
                </div>
                
                <div class="image-upload-controls">
                    <label for="imageUpload" class="upload-btn">
                        Choose Image
                    </label>
                    <input 
                        type="file" 
                        id="imageUpload" 
                        accept="image/jpeg,image/png,image/gif,image/webp"
                        hidden
                    >
                    <button id="removeImage" class="remove-btn" style="display: none;">
                        Remove
                    </button>
                </div>
                
                <div class="upload-info">
                    <p>Supported formats: JPEG, PNG, GIF, WebP</p>
                    <p>Maximum file size: 5MB</p>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>
            </div>
            
            <div class="profile-info">
                <div class="form-group">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" placeholder="Enter your name">
                </div>
                
                <div class="form-group">
                    <label for="userEmail">Email</label>
                    <input type="email" id="userEmail" placeholder="Enter your email">
                </div>
                
                <div class="form-group">
                    <label for="userBio">Bio</label>
                    <textarea id="userBio" placeholder="Tell us about yourself" rows="3"></textarea>
                </div>
                
                <button id="saveProfile" class="save-btn">Save Profile</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
